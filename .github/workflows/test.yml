name: Test

on:
  push:
    branches-ignore:
      - main # deploy.yml handles testing
  pull_request:
  workflow_dispatch:

jobs:
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pytest
        run: uv run pytest
